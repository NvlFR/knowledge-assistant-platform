services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ka-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-knowledge_assistant}
    ports:
      - "4444:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ka-redis
    restart: unless-stopped
    ports:
      - "4445:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  mcp-server:
    build: ./mcp-server
    container_name: ka-mcp-server
    restart: unless-stopped
    environment:
      READONLY_DATABASE_URL: postgresql://readonly_bot:readonly_bot_password@postgres:5432/${POSTGRES_DB:-knowledge_assistant}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      TAVILY_API_KEY: ${TAVILY_API_KEY}
      MCP_SERVER_PORT: 8001
    ports:
      - "4446:8001"
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build: ./backend
    container_name: ka-backend
    restart: unless-stopped
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4o-mini}
      MCP_SERVER_URL: http://mcp-server:8001/mcp
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost:4448
      UPLOAD_DIR: /uploads
    volumes:
      - kb_uploads:/uploads
    ports:
      - "4447:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mcp-server:
        condition: service_started

  worker:
    build: ./worker
    container_name: ka-worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-knowledge_assistant}
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      KB_DIR: /knowledge_base
      UPLOAD_DIR: /uploads
    volumes:
      - ./infrastructure/knowledge_base:/knowledge_base:ro
      - kb_uploads:/uploads:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: ka-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://localhost:4447}
    ports:
      - "4448:3000"
    depends_on:
      - backend

volumes:
  pg_data:
  kb_uploads:
